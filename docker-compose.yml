services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      LOG_DIR: /app/data/logs
    volumes:
      - sqlite_data:/app/data
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
